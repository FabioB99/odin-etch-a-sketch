<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./styles.css">
    <title>Document</title>
</head>

<body>
    <div class="sketch-area">
        <div class=btn-container>
            <button class="btn">New Grid</button>
            <button class="clear">Clear</button>
        </div>
        <div class="container"></div>
        <div class="tool-container">
            <div>
                <input type="checkbox" id="rainbow-mode">
                <label for="rainbow-mode" class="rainbow-mode-label">Rainbow Mode</label>
            </div>
            <div>
                <input type="checkbox" id="eraser-mode">
                <label for="eraser-mode" class="eraser-mode-label">Eraser</label>
            </div>
            <div>
                <input type="checkbox" id="darkening-mode">
                <label for="darkening-mode" class="darkening-mode-label">Darkening Mode</label>
            </div>
        </div>
    </div>

</body>

</html>
